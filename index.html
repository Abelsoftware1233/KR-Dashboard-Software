<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPP Command Center - PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper">
        <header id="main-header">
            <h1>NPP CENTRAL COMMAND - UNIT 4 & 5</h1>
            <div id="system-clock">00:00:00</div>
        </header>

        <div class="units-container">
            <div class="unit-box" id="unit-4">
                <div class="unit-header"><h2>REACTOR UNIT 04</h2> <span class="status-indicator" id="u4-status">NOMINAL</span></div>
                <div class="display-panel">
                    <div class="metric"><label>TEMP</label><span id="u4-temp">285.0</span>°C</div>
                    <div class="metric"><label>LOAD</label><span id="u4-power">0</span> MW</div>
                    <div class="gauge-container"><div id="u4-gauge" class="gauge-bar"></div></div>
                </div>
                <div class="control-panel">
                    <button class="btn btn-rod" onmousedown="u4.startAdjust(0.5)" onmouseup="u4.stopAdjust()">RODS UP</button>
                    <button class="btn btn-rod" onmousedown="u4.startAdjust(-0.5)" onmouseup="u4.stopAdjust()">RODS DOWN</button>
                    <button class="btn btn-scram" onclick="u4.scram()">SCRAM</button>
                </div>
            </div>

            <div class="unit-box" id="unit-5">
                <div class="unit-header"><h2>REACTOR UNIT 05</h2> <span class="status-indicator" id="u5-status">NOMINAL</span></div>
                <div class="display-panel">
                    <div class="metric"><label>TEMP</label><span id="u5-temp">285.0</span>°C</div>
                    <div class="metric"><label>LOAD</label><span id="u5-power">0</span> MW</div>
                    <div class="gauge-container"><div id="u5-gauge" class="gauge-bar"></div></div>
                </div>
                <div class="control-panel">
                    <button class="btn btn-rod" onmousedown="u5.startAdjust(0.5)" onmouseup="u5.stopAdjust()">RODS UP</button>
                    <button class="btn btn-rod" onmousedown="u5.startAdjust(-0.5)" onmouseup="u5.stopAdjust()">RODS DOWN</button>
                    <button class="btn btn-scram" onclick="u5.scram()">SCRAM</button>
                </div>
            </div>
        </div>
    </div>

    <script src="reactor.js"></script>
    <script src="main.js"></script>
</body>
</html>
