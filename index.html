<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPP Command Center - Dual Unit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="command-center">
        <header>
            <h1>NPP CENTRAL COMMAND - UNIT 4 & 5</h1>
            <div id="system-clock">00:00:00</div>
        </header>

        <div class="dual-console-wrapper">
            <div class="console-unit" id="unit-4">
                <h2>REACTOR UNIT 04</h2>
                <div class="monitor">
                    <div class="stat"><label>TEMP</label><span id="u4-temp">285</span>°C</div>
                    <div class="stat"><label>LOAD</label><span id="u4-power">0</span> MW</div>
                    <div class="gauge-bg"><div id="u4-gauge" class="gauge-fill"></div></div>
                </div>
                <div class="status-box" id="u4-status">NOMINAL</div>
                <div class="controls">
                    <button class="btn" onmousedown="u4.startAdjust(0.5)" onmouseup="u4.stopAdjust()">RODS UP</button>
                    <button class="btn" onmousedown="u4.startAdjust(-0.5)" onmouseup="u4.stopAdjust()">RODS DOWN</button>
                    <button class="btn btn-scram" onclick="u4.scram()">SCRAM</button>
                </div>
            </div>

            <div class="console-unit" id="unit-5">
                <h2>REACTOR UNIT 05</h2>
                <div class="monitor">
                    <div class="stat"><label>TEMP</label><span id="u5-temp">285</span>°C</div>
                    <div class="stat"><label>LOAD</label><span id="u5-power">0</span> MW</div>
                    <div class="gauge-bg"><div id="u5-gauge" class="gauge-fill"></div></div>
                </div>
                <div class="status-box" id="u5-status">NOMINAL</div>
                <div class="controls">
                    <button class="btn" onmousedown="u5.startAdjust(0.5)" onmouseup="u5.stopAdjust()">RODS UP</button>
                    <button class="btn" onmousedown="u5.startAdjust(-0.5)" onmouseup="u5.stopAdjust()">RODS DOWN</button>
                    <button class="btn btn-scram" onclick="u5.scram()">SCRAM</button>
                </div>
            </div>
        </div>
    </div>

    <script src="reactor.js"></script>
    <script src="main.js"></script>
</body>
</html>
